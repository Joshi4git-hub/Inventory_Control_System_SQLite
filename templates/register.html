{% extends "base.html" %}
{% block title %}Register — Inventory Control System{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">📦</div>
      <h1>Create Account</h1>
      <p>Register to manage your inventory</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Your name" required />
      </div>

      <div class="form-group" style="margin-top:1rem;">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group" style="margin-top:1rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 6 characters" required />
      </div>

      <div class="form-group" style="margin-top:1rem;">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.5rem;">
        Create Account →
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('login') }}">Login here</a>
    </p>

  </div>
</div>
{% endblock %}
