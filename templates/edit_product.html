{% extends "base.html" %}
{% block title %}Edit Product — Inventory Control System{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Product</h1>
  <p>Update record for <span style="color:var(--accent)">{{ product['name'] }}</span></p>
</div>

<div class="card" style="max-width:660px;">
  <div class="card-title">Edit Form</div>

  <form method="POST" action="{{ url_for('edit_product', product_id=product['id']) }}">
    <div class="form-grid">

      <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" value="{{ product['name'] }}" required />
      </div>

      <div class="form-group">
        <label for="supplier">Supplier</label>
        <input type="text" id="supplier" name="supplier" value="{{ product['supplier'] }}" required />
      </div>

      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" value="{{ product['quantity'] }}" min="0" required />
      </div>

      <div class="form-group">
        <label for="price">Price (INR)</label>
        <div class="input-prefix">
          <span>₹</span>
          <input type="number" id="price" name="price" value="{{ product['price'] }}"
                 step="0.01" min="0" required />
        </div>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✔ Save Changes</button>
      <a href="{{ url_for('view_products') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
