{% extends "base.html" %}
{% block title %}Add Product — Inventory Control System{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Product</h1>
  <p>Insert a new product record into the database.</p>
</div>

<div class="card" style="max-width:660px;">
  <div class="card-title">New Product Form</div>

  <form method="POST" action="{{ url_for('add_product') }}">
    <div class="form-grid">

      <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. HP Laptop" required />
      </div>

      <div class="form-group">
        <label for="supplier">Supplier</label>
        <input type="text" id="supplier" name="supplier" placeholder="e.g. Dell Inc." required />
      </div>

      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" placeholder="0" min="0" required />
      </div>

      <div class="form-group">
        <label for="price">Price (INR)</label>
        <div class="input-prefix">
          <span>₹</span>
          <input type="number" id="price" name="price" placeholder="0.00"
                 step="0.01" min="0" required />
        </div>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">➕ Add to Database</button>
      <a href="{{ url_for('view_products') }}" class="btn btn-ghost">View Products</a>
    </div>
  </form>
</div>
{% endblock %}
